<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Green Room — Content Ops</title>
<meta name="description" content="Green Room is your creator content operations hub — manage influencer brand bibles, content calendars, idea banks, and swipe files in one place.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF8F3;
    --ink:#201A2B;
    --ink-soft:#635C71;
    --coral:#FF4D6D;
    --coral-dim:#FFE1E6;
    --teal:#1FA9A1;
    --teal-dim:#DCF3F1;
    --amber:#F2A93B;
    --amber-dim:#FBEACB;
    --line:#E4DED2;
    --card:#FFFFFF;
    --shadow:0 1px 2px rgba(32,26,43,.06),0 4px 14px rgba(32,26,43,.05);
    --shadow-md:0 6px 28px rgba(32,26,43,.13);
    --shadow-lg:0 24px 72px rgba(0,0,0,.24);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;}

  /* ── App shell ── */
  .app{display:flex;min-height:100vh;}

  /* ── Sidebar ── */
  .sidebar{
    width:224px;flex:none;background:var(--ink);color:var(--paper);
    padding:28px 0 20px;display:flex;flex-direction:column;
    position:sticky;top:0;height:100vh;overflow-y:auto;
  }
  .brandmark{
    font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:22px;
    padding:0 22px 22px;letter-spacing:.2px;
    border-bottom:1px solid rgba(250,248,243,.14);margin-bottom:0;
  }
  .brandmark small{display:block;font-family:'JetBrains Mono',monospace;font-style:normal;font-size:10px;letter-spacing:1.5px;color:var(--coral);margin-top:4px;}

  /* Sidebar active-influencer context strip */
  .sidebar-ctx{padding:10px 22px;border-bottom:1px solid rgba(250,248,243,.1);display:none;animation:fadeIn .2s ease;}
  .sidebar-ctx.show{display:block;}
  .sidebar-ctx-label{font-size:9px;font-family:'JetBrains Mono',monospace;color:rgba(250,248,243,.3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
  .sidebar-ctx-row{display:flex;align-items:center;gap:8px;}
  .sidebar-ctx-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'Fraunces',serif;flex:none;}
  .sidebar-ctx-name{font-size:12px;font-weight:600;color:var(--paper);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
  .sidebar-ctx-clear{font-size:9px;font-family:'JetBrains Mono',monospace;color:rgba(250,248,243,.35);cursor:pointer;background:none;border:none;padding:0;flex:none;white-space:nowrap;transition:color .12s;}
  .sidebar-ctx-clear:hover{color:var(--coral);}

  .tabs{display:flex;flex-direction:column;margin-top:8px;}
  .tab{display:flex;align-items:center;gap:10px;padding:12px 22px;cursor:pointer;font-size:14px;color:rgba(250,248,243,.65);border-left:3px solid transparent;transition:all .15s ease;position:relative;}
  .tab .num{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(250,248,243,.35);}
  .tab:hover{color:var(--paper);background:rgba(250,248,243,.04);}
  .tab.active{color:var(--paper);border-left-color:var(--coral);background:rgba(255,77,109,.09);}
  .tab.active .num{color:var(--coral);}
  .sidebar-foot{margin-top:auto;padding:14px 22px 0;font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(250,248,243,.3);border-top:1px solid rgba(250,248,243,.1);}
  .conn-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--coral);margin-right:6px;}
  .conn-dot.ok{background:var(--teal);}

  /* ── Main content area ── */
  .main{flex:1;padding:36px 44px 80px;max-width:1020px;}
  .page-head{margin-bottom:26px;}
  .page-head h1{font-family:'Fraunces',serif;font-weight:600;font-size:30px;margin:0 0 6px;}
  .page-head p{color:var(--ink-soft);font-size:14px;margin:0;max-width:520px;}

  /* ── Buttons ── */
  .btn{font-family:'Inter',sans-serif;font-weight:600;font-size:13px;border:none;border-radius:8px;padding:9px 18px;cursor:pointer;background:var(--ink);color:var(--paper);transition:transform .1s ease,opacity .15s ease;white-space:nowrap;}
  .btn:hover{opacity:.85;}
  .btn:active{transform:scale(.97);}
  .btn.primary{background:var(--coral);}
  .btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line);}
  .btn.sm{font-size:12px;padding:6px 13px;}
  .btn.teal{background:var(--teal);color:#fff;}
  .btn.amber{background:var(--amber);color:#fff;}
  .icon-btn{border:none;background:transparent;cursor:pointer;color:var(--ink-soft);font-size:13px;padding:5px 7px;border-radius:6px;transition:background .12s,color .12s;}
  .icon-btn:hover{background:var(--paper);color:var(--ink);}

  /* ── Dashboard header ── */
  .dash-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px;gap:16px;flex-wrap:wrap;}

  /* ── Influencer grid ── */
  .inf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;}

  /* ── Influencer card ── */
  .inf-card{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    overflow:hidden;box-shadow:var(--shadow);
    transition:transform .18s ease,box-shadow .18s ease;
    cursor:pointer;
  }
  .inf-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md);}
  .inf-card-band{height:72px;position:relative;display:flex;align-items:center;justify-content:center;}
  .inf-avatar{
    width:58px;height:58px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif;font-size:24px;font-weight:600;
    border:3px solid var(--card);
    position:absolute;bottom:-29px;left:50%;transform:translateX(-50%);
    z-index:1;transition:transform .18s ease;
  }
  .inf-card:hover .inf-avatar{transform:translateX(-50%) scale(1.06);}
  .inf-card-body{padding:38px 18px 14px;text-align:center;}
  .inf-name{font-family:'Fraunces',serif;font-weight:600;font-size:17px;margin-bottom:7px;line-height:1.2;}
  .inf-niche-pill{display:inline-block;font-size:11px;padding:3px 11px;border-radius:100px;font-family:'JetBrains Mono',monospace;margin-bottom:14px;font-weight:500;}
  .inf-stats{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--line);padding:12px 0 0;}
  .inf-stat{text-align:center;padding:0 4px;}
  .inf-stat-num{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;line-height:1;}
  .inf-stat-label{font-size:9px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px;margin-top:3px;}
  .inf-card-foot{border-top:1px solid var(--line);padding:10px 12px;display:flex;gap:6px;align-items:center;margin-top:12px;}
  .inf-card-foot .ql-btn{flex:1;text-align:left;}

  /* ── Empty dash state ── */
  .empty-dash{
    text-align:center;padding:70px 20px;border:2px dashed var(--line);border-radius:16px;
    background:linear-gradient(135deg,rgba(255,77,109,.02),rgba(31,169,161,.02));
  }
  .empty-dash-icon{font-size:54px;margin-bottom:18px;}
  .empty-dash h3{font-family:'Fraunces',serif;font-size:26px;margin:0 0 10px;}
  .empty-dash p{color:var(--ink-soft);font-size:14px;max-width:380px;margin:0 auto 26px;line-height:1.65;}

  /* ── Quick Look overlay ── */
  .ql-overlay{position:fixed;inset:0;background:rgba(32,26,43,.5);display:none;align-items:center;justify-content:center;z-index:60;padding:16px;}
  .ql-overlay.show{display:flex;animation:fadeIn .15s ease;}
  .ql-modal{
    background:var(--paper);border-radius:16px;width:860px;max-width:100%;
    max-height:90vh;overflow:hidden;display:flex;flex-direction:column;
    box-shadow:0 30px 90px rgba(0,0,0,.28);animation:slideUp .2s ease;
  }
  .ql-header{padding:22px 28px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--line);flex:none;}
  .ql-header-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:22px;font-weight:600;flex:none;}
  .ql-header-info{flex:1;min-width:0;}
  .ql-header-info h2{font-family:'Fraunces',serif;font-size:21px;margin:0 0 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ql-header-info p{font-size:13px;color:var(--ink-soft);margin:0;}
  .ql-close{border:none;background:none;font-size:26px;cursor:pointer;color:var(--ink-soft);padding:2px 8px;border-radius:6px;line-height:1;flex:none;transition:background .12s,color .12s;}
  .ql-close:hover{background:var(--line);color:var(--ink);}
  .ql-body{display:grid;grid-template-columns:272px 1fr;flex:1;overflow:hidden;min-height:0;}
  .ql-profile{padding:22px 22px;overflow-y:auto;border-right:1px solid var(--line);}
  .ql-activity{padding:22px 24px;overflow-y:auto;display:flex;flex-direction:column;gap:24px;}
  .ql-sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-soft);margin-bottom:11px;}
  .ql-profile-row{margin-bottom:16px;}
  .ql-profile-label{font-size:10px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
  .ql-profile-val{font-size:13px;line-height:1.6;white-space:pre-line;color:var(--ink);}
  .ql-pillars{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
  .ql-pillar{font-size:11px;padding:3px 9px;border-radius:100px;font-family:'JetBrains Mono',monospace;font-weight:500;}
  .ql-mini-item{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:10px 13px;margin-bottom:8px;}
  .ql-mini-title{font-size:13px;font-weight:600;margin-bottom:5px;}
  .ql-mini-meta{font-size:11px;color:var(--ink-soft);display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .ql-empty-note{font-size:13px;color:var(--ink-soft);padding:14px 12px;text-align:center;border:1px dashed var(--line);border-radius:8px;}
  .ql-stage-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .ql-stage-name{font-size:12px;width:72px;flex:none;color:var(--ink-soft);}
  .ql-stage-bar-wrap{flex:1;height:6px;background:var(--line);border-radius:3px;overflow:hidden;}
  .ql-stage-bar-fill{height:100%;border-radius:3px;transition:width .3s ease;}
  .ql-stage-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);width:18px;text-align:right;flex:none;}
  .ql-footer{padding:14px 28px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center;flex:none;flex-wrap:wrap;}

  /* ── Influencer filter pills (in other tabs) ── */
  .inf-filter{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--line);align-items:center;}
  .inf-filter-label{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px;margin-right:3px;flex:none;}
  .inf-pill{font-size:11px;font-family:'JetBrains Mono',monospace;padding:4px 12px;border-radius:100px;cursor:pointer;border:1.5px solid var(--line);color:var(--ink-soft);background:var(--card);transition:all .13s ease;font-weight:500;white-space:nowrap;}
  .inf-pill:hover{border-color:var(--coral);color:var(--coral);}
  .inf-pill.active{border-color:currentColor;}

  /* ── Generic list styles ── */
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .card-list{display:flex;flex-direction:column;gap:10px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:8px;}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
  .card-title{font-weight:600;font-size:15px;}
  .card-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:100px;font-family:'JetBrains Mono',monospace;letter-spacing:.3px;}
  .pill.platform{background:var(--teal-dim);color:var(--teal);}
  .pill.status{background:var(--coral-dim);color:var(--coral);}
  .card-notes{font-size:13px;color:var(--ink-soft);line-height:1.5;}
  .swipe-notes{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:4px;}
  .swipe-notes li{font-size:13px;line-height:1.5;padding-left:20px;position:relative;color:var(--ink);}
  .swipe-notes li.pos::before{content:"+";position:absolute;left:2px;top:0;color:var(--teal);font-weight:700;}
  .swipe-notes li.neg::before{content:"–";position:absolute;left:2px;top:0;color:var(--coral);font-weight:700;}
  .swipe-notes li.neu::before{content:"•";position:absolute;left:4px;top:0;color:var(--ink-soft);}
  .card-actions{display:flex;gap:6px;margin-left:auto;}
  .empty{border:1px dashed var(--line);border-radius:10px;padding:34px;text-align:center;color:var(--ink-soft);font-size:14px;}
  .link{color:var(--coral);text-decoration:none;font-weight:600;font-size:13px;}
  .link:hover{text-decoration:underline;}

  /* ── Kanban ── */
  .kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start;}
  .kcol{background:rgba(228,222,210,.35);border-radius:10px;padding:12px;min-height:100px;}
  .kcol h3{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-soft);margin:0 0 10px;display:flex;justify-content:space-between;align-items:center;}
  .kcol h3 span{font-family:'JetBrains Mono',monospace;font-weight:400;}
  .kcard{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:10px 11px;margin-bottom:8px;box-shadow:var(--shadow);}
  .kcard .card-title{font-size:13.5px;}
  .kcard .card-notes{font-size:12px;}
  .kadd{width:100%;background:none;border:1px dashed var(--line);border-radius:8px;padding:8px;color:var(--ink-soft);font-size:12px;cursor:pointer;transition:border-color .12s,color .12s;}
  .kadd:hover{border-color:var(--coral);color:var(--coral);}

  /* ── Standard modal ── */
  .overlay{position:fixed;inset:0;background:rgba(32,26,43,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:16px;}
  .overlay.show{display:flex;animation:fadeIn .15s ease;}
  .modal{background:var(--paper);border-radius:14px;padding:26px 28px;width:460px;max-width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .18s ease;}
  .modal.wide{width:560px;}
  .modal h2{font-family:'Fraunces',serif;font-size:20px;margin:0 0 18px;}
  .modal-actions{display:flex;justify-content:space-between;margin-top:20px;gap:10px;}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:15px;}
  .field label{font-size:12px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.4px;}
  .field input,.field textarea,.field select{font-family:'Inter',sans-serif;font-size:14px;color:var(--ink);border:1.5px solid var(--line);border-radius:8px;padding:10px 12px;background:var(--card);resize:vertical;transition:border-color .12s,outline .12s;}
  .field input:focus,.field textarea:focus,.field select:focus{outline:2px solid var(--coral);outline-offset:1px;border-color:transparent;}
  .save-note{font-size:12px;color:var(--teal);font-family:'JetBrains Mono',monospace;opacity:0;transition:opacity .3s;}
  .save-note.show{opacity:1;}

  /* ── Setup banner ── */
  .setup-banner{background:#fff;border:1px solid var(--coral);border-radius:10px;padding:16px 18px;margin-bottom:22px;font-size:13px;line-height:1.6;color:var(--ink);}
  .setup-banner code{background:var(--paper);padding:1px 5px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:12px;}

  /* ── Animations ── */
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

  /* ── Scrollbar ── */
  ::-webkit-scrollbar{width:7px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}

  /* ── Responsive ── */
  @media(max-width:800px){
    .app{flex-direction:column;}
    .sidebar{width:100%;flex-direction:row;overflow-x:auto;padding:12px;height:auto;position:static;}
    .brandmark{display:none;}
    .sidebar-ctx{display:none!important;}
    .tabs{flex-direction:row;}
    .tab{border-left:none;border-bottom:3px solid transparent;white-space:nowrap;}
    .tab.active{border-left:none;border-bottom-color:var(--coral);}
    .sidebar-foot{display:none;}
    .main{padding:22px 18px 60px;}
    .ql-body{grid-template-columns:1fr;}
    .ql-profile{border-right:none;border-bottom:1px solid var(--line);}
    .inf-grid,.kanban{grid-template-columns:repeat(2,1fr);}
  }
  @media(max-width:480px){
    .inf-grid,.kanban{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="brandmark">Green Room<small>CONTENT OPS</small></div>

    <!-- Active influencer context indicator -->
    <div class="sidebar-ctx" id="sidebarCtx">
      <div class="sidebar-ctx-label">Viewing</div>
      <div class="sidebar-ctx-row">
        <div class="sidebar-ctx-dot" id="sidebarCtxDot"></div>
        <div class="sidebar-ctx-name" id="sidebarCtxName"></div>
        <button class="sidebar-ctx-clear" id="sidebarCtxClear">All ×</button>
      </div>
    </div>

    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="brand"><span class="num">01</span> Brand Bible</div>
      <div class="tab" data-tab="calendar"><span class="num">02</span> Calendar</div>
      <div class="tab" data-tab="ideas"><span class="num">03</span> Idea Bank</div>
      <div class="tab" data-tab="swipe"><span class="num">04</span> Swipe File</div>
      <div class="tab" data-tab="campaigns"><span class="num">05</span> Campaigns</div>
    </div>

    <div class="sidebar-foot">
      <span class="conn-dot" id="connDot"></span><span id="connLabel">Connecting…</span>
    </div>
  </div>

  <div class="main" id="main">
    <div class="page-head"><h1>Loading…</h1></div>
  </div>
</div>

<!-- Standard modal (forms) -->
<div class="overlay" id="overlay">
  <div class="modal" id="modalBox"></div>
</div>

<!-- Quick Look overlay -->
<div class="ql-overlay" id="qlOverlay">
  <div class="ql-modal" id="qlBox"></div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ======================================================
// 1. SUPABASE CONFIG  (Settings → API in your dashboard)
// ======================================================
const SUPABASE_URL      = 'https://dyxybkxqvgfemvhxrbsn.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5eHlia3hxdmdmZW12aHhyYnNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5OTE1NTcsImV4cCI6MjA5OTU2NzU1N30.1Clt7UoQVCwzrNR_DyNzD9A31EIZci-hP4gvUupF2Mw';
// ======================================================

const configured = !SUPABASE_URL.includes('YOUR_') && !SUPABASE_ANON_KEY.includes('YOUR_');
const supabase   = configured ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

// ── Constants ──────────────────────────────────────────
const PLATFORMS        = ["TikTok","Instagram Reels","YouTube","X / Twitter","Reddit","Twitch","Other"];
const CAL_STATUSES     = ["Idea","Scripted","Filming","Editing","Scheduled","Posted"];
const IDEA_STAGES      = ["Idea","Filmed","Posted"];
const CAMPAIGN_STATUSES= ["Planning","Active","Complete"];

// Color palette for influencer avatars (derived from name hash)
const PALETTE = [
  {bg:'#FF4D6D',text:'#fff',dim:'#FFE1E6'},
  {bg:'#1FA9A1',text:'#fff',dim:'#DCF3F1'},
  {bg:'#7C3AED',text:'#fff',dim:'#EDE9FE'},
  {bg:'#F59E0B',text:'#fff',dim:'#FEF3C7'},
  {bg:'#059669',text:'#fff',dim:'#D1FAE5'},
  {bg:'#0284C7',text:'#fff',dim:'#E0F2FE'},
  {bg:'#DB2777',text:'#fff',dim:'#FCE7F3'},
  {bg:'#D97706',text:'#fff',dim:'#FBEACB'},
];

// ── State ──────────────────────────────────────────────
const state = {
  influencers: [],
  calendar:    [],
  ideas:       [],
  swipe:       [],
  campaigns:   [],
  activeInfluencerId: null,
};
let currentTab   = 'brand';
let takeCounter  = 1;
let currentCfg   = null;

// ── Utilities ──────────────────────────────────────────
function nextTake() { return takeCounter++; }
function esc(s) {
  return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function colorFor(name) {
  const h = (name||'?').split('').reduce((a,c)=>a+c.charCodeAt(0), 0);
  return PALETTE[h % PALETTE.length];
}
function initial(name) { return ((name||'?').trim()[0]||'?').toUpperCase(); }

function filteredItems(key) {
  const items = state[key];
  if (!state.activeInfluencerId) return items;
  return items.filter(i => i.influencer_id === state.activeInfluencerId);
}
function statsFor(infId) {
  return {
    posts:    state.calendar.filter(i => i.influencer_id === infId).length,
    ideas:    state.ideas.filter(i => i.influencer_id === infId).length,
    swipe:    state.swipe.filter(i => i.influencer_id === infId).length,
  };
}

// ── Supabase helpers ───────────────────────────────────
async function sbSelect(table) {
  const {data,error} = await supabase.from(table).select('*').order('created_at',{ascending:false});
  if (error) { console.error(table,error); return []; }
  return data;
}
async function sbInsert(table, obj) {
  const {data,error} = await supabase.from(table).insert(obj).select().single();
  if (error) { console.error(table,error); alert('Save failed: '+error.message); return null; }
  return data;
}
async function sbUpdate(table, id, obj) {
  const {data,error} = await supabase.from(table).update(obj).eq('id',id).select().single();
  if (error) { console.error(table,error); alert('Save failed: '+error.message); return null; }
  return data;
}
async function sbDelete(table, id) {
  const {error} = await supabase.from(table).delete().eq('id',id);
  if (error) { console.error(table,error); alert('Delete failed: '+error.message); return false; }
  return true;
}

async function loadAll() {
  const [influencers,calendar,ideas,swipe,campaigns] = await Promise.all([
    sbSelect('brand_bible'),
    sbSelect('calendar_items'),
    sbSelect('idea_bank'),
    sbSelect('swipe_file'),
    sbSelect('campaigns'),
  ]);
  state.influencers = influencers;
  state.calendar    = calendar;
  state.ideas       = ideas;
  state.swipe       = swipe;
  state.campaigns   = campaigns;
  const maxTake = Math.max(0,...[...calendar,...ideas,...swipe,...campaigns].map(i=>i.take_number||0));
  takeCounter = maxTake + 1;
}

// ── Sidebar context ────────────────────────────────────
function updateSidebarCtx() {
  const ctx = document.getElementById('sidebarCtx');

  const c = colorFor(inf.influencer_name);

  dot.style.color      = c.text;
  dot.textContent      = initial(inf.influencer_name);
  document.getElementById('sidebarCtxName').textContent = inf.influencer_name;

};

// ── Tab routing ────────────────────────────────────────
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  render(tab.dataset.tab);
});

function render(tab) {
  currentTab = tab;
  const main = document.getElementById('main');
  if (!configured) { renderSetupNeeded(main); return; }
  if (tab === 'brand')     renderDashboard(main);
  else if (tab === 'calendar') renderList(main,{key:'calendar',table:'calendar_items',title:'Content Calendar',sub:'Everything scheduled to go out, in order.',fields:calendarFields(),empty:'No content scheduled yet — add your first post.'});
  else if (tab === 'ideas')    renderKanban(main);
  else if (tab === 'swipe')    renderList(main,{key:'swipe',table:'swipe_file',title:'Swipe File',sub:'Creators and their pros and cons',fields:swipeFields(),empty:'No references saved yet — add a creator or video to study.'});
  else if (tab === 'campaigns') renderList(main,{key:'campaigns',table:'campaigns',title:'Campaigns & Strategy',sub:'',fields:campaignFields(),empty:'No campaigns yet — sketch out your first one.'});
}

function navigateTo(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`)?.classList.add('active');
  render(tab);
}

async function deleteInfluencer(inf) {
  if (!confirm(`Delete "${inf.influencer_name}"?\n\nThis will NOT delete their content — posts, ideas, and swipe items will remain but become unassigned.`)) return;
  const ok = await sbDelete('brand_bible', inf.id);
  if (ok) {
    state.influencers = state.influencers.filter(i => i.id !== inf.id);
    if (state.activeInfluencerId === inf.id) { state.activeInfluencerId = null; updateSidebarCtx(); }
    render('brand');
  }
}

function campaignFields()  { return [{key:'title',label:'Campaign Name',type:'text'},{key:'status',label:'Status',type:'select',options:CAMPAIGN_STATUSES},{key:'timeframe',label:'Timeframe',type:'text'},{key:'channels',label:'Channels',type:'text'},{key:'notes',label:'Goal / Strategy Notes',type:'textarea'}]; }

function renderList(main, cfg) {
  currentCfg  = cfg;
  const items = [...filteredItems(cfg.key)].sort((a,b) => (b.date||'').localeCompare(a.date||'') || (b.take_number - a.take_number));
  main.innerHTML = `
    <div class="page-head"><h1>${cfg.title}</h1><p>${cfg.sub}</p></div>
    ${influencerFilterHtml()}
    <div class="toolbar"><span></span><button class="btn primary" id="addBtn">+ Add</button></div>
    <div class="card-list" id="listWrap"></div>`;
  attachFilterPills();
  const wrap = document.getElementById('listWrap');
  if (items.length === 0) { wrap.innerHTML = `<div class="empty">${cfg.empty}</div>`; }
  else { items.forEach(item => wrap.appendChild(buildCard(item, cfg))); }
  document.getElementById('addBtn').onclick = () => openModal(cfg, null);
}

function formatSwipeNotes(notes) {
  const lines = (notes||'').split('\n').map(l => l.trim()).filter(Boolean);
  if (lines.length === 0) return '';
  const items = lines.map(line => {
    if (line.startsWith('+')) return {cls:'pos', text: line.slice(1).trim()};
    if (line.startsWith('-') || line.startsWith('–')) return {cls:'neg', text: line.slice(1).trim()};
    return {cls:'neu', text: line};
  });
  return `<ul class="swipe-notes">${items.map(i => `<li class="${i.cls}">${esc(i.text)}</li>`).join('')}</ul>`;
}

function buildCard(item, cfg) {
  const div  = document.createElement('div');
  div.className = 'card';
  const inf  = state.influencers.find(i => i.id === item.influencer_id);
  const c    = inf ? colorFor(inf.influencer_name) : null;
  const infBadge    = inf ? `<span class="pill" style="background:${c.dim};color:${c.bg};">${initial(inf.influencer_name)} ${esc(inf.influencer_name)}</span>` : '';
  const platformPill= item.platform ? `<span class="pill platform">${esc(item.platform)}</span>` : '';
  const statusPill  = item.status   ? `<span class="pill status">${esc(item.status)}</span>` : '';
  const dateBit     = item.date     ? `<span class="pill status" style="background:var(--amber-dim);color:var(--amber);">${esc(item.date)}</span>` : '';
  const linkBit     = item.link     ? `<a class="link" href="${esc(item.link)}" target="_blank" rel="noopener">Open reference ↗</a>` : '';
  div.innerHTML = `
    <div class="card-top">
      <div>
        <div class="card-title">${esc(item.title)||'Untitled'}</div>
      </div>
      <div class="card-actions">
        <button class="icon-btn" data-act="edit">Edit</button>
        <button class="icon-btn" data-act="del">Delete</button>
      </div>
    </div>
    <div class="card-meta">${dateBit}${platformPill}${statusPill}${infBadge}${item.tag?`<span class="pill platform">${esc(item.tag)}</span>`:''}</div>
    ${item.notes    ? (cfg.key === 'swipe' ? formatSwipeNotes(item.notes) : `<div class="card-notes">${esc(item.notes)}</div>`) : ''}
    ${item.channels ? `<div class="card-notes"><strong>Channels:</strong> ${esc(item.channels)}</div>` : ''}
    ${item.timeframe? `<div class="card-notes"><strong>Timeframe:</strong> ${esc(item.timeframe)}</div>` : ''}
    ${linkBit}`;
  div.querySelector('[data-act="edit"]').onclick = () => openModal(currentCfg, item);
  div.querySelector('[data-act="del"]').onclick  = () => deleteItem(currentCfg, item.id);
  return div;
}

function openModal(cfg, item) {
  const overlay = document.getElementById('overlay');
  const box     = document.getElementById('modalBox');
  box.className  = 'modal';
  const isEdit   = !!item;
  const data     = item || {};

  // Creator selector — pre-select active influencer on new items
  const infOptions = state.influencers.map(inf =>
    `<option value="${inf.id}" ${(data.influencer_id === inf.id || (!isEdit && state.activeInfluencerId === inf.id)) ? 'selected' : ''}>${esc(inf.influencer_name)}</option>`
  ).join('');
  const infFieldHtml = state.influencers.length > 0
    ? `<div class="field"><label>Creator</label><select id="m-influencer_id"><option value="">— Unassigned —</option>${infOptions}</select></div>`
    : '';

  const fieldsHtml = cfg.fields.map(f => {
    const val = esc(data[f.key]||'');
    if (f.type === 'textarea') return `<div class="field"><label>${f.label}</label><textarea rows="3" id="m-${f.key}" placeholder="${esc(f.placeholder||'')}">${val}</textarea></div>`;
    if (f.type === 'select') {
      const opts = f.options.map(o => `<option value="${o}" ${data[f.key]===o?'selected':''}>${o}</option>`).join('');
      return `<div class="field"><label>${f.label}</label><select id="m-${f.key}">${opts}</select></div>`;
    }
    return `<div class="field"><label>${f.label}</label><input type="${f.type}" id="m-${f.key}" value="${val}"></div>`;
  }).join('');

  box.innerHTML = `
    <h2>${isEdit ? 'Edit' : 'Add'} — ${cfg.title}</h2>
    ${infFieldHtml}
    ${fieldsHtml}
    <div class="modal-actions">
      <button class="btn ghost" id="mCancel">Cancel</button>
      <button class="btn primary" id="mSave">${isEdit ? 'Save' : 'Add'}</button>
    </div>`;
  overlay.classList.add('show');
  document.getElementById('mCancel').onclick = closeModal;
  document.getElementById('mSave').onclick   = async () => {
    const obj = {};
    cfg.fields.forEach(f => obj[f.key] = document.getElementById('m-'+f.key).value);
    const infSel = document.getElementById('m-influencer_id');
    if (infSel) obj.influencer_id = infSel.value || null;
    if (isEdit) {
      const saved = await sbUpdate(cfg.table, item.id, obj);
      if (saved) { const idx = state[cfg.key].findIndex(x => x.id === item.id); state[cfg.key][idx] = saved; }
    } else {
      obj.take_number = nextTake();
      const saved = await sbInsert(cfg.table, obj);
      if (saved) state[cfg.key].push(saved);
    }
    closeModal();
    render(currentTab);
  };
}

function closeModal() { document.getElementById('overlay').classList.remove('show'); }
document.getElementById('overlay').addEventListener('click', e => { if (e.target.id === 'overlay') closeModal(); });

async function deleteItem(cfg, id) {
  const ok = await sbDelete(cfg.table, id);
  if (ok) { state[cfg.key] = state[cfg.key].filter(x => x.id !== id); render(currentTab); }
}

// ── Idea Bank (kanban) ─────────────────────────────────
function ideaModalFields() { return [{key:'title',label:'Video Idea',type:'text'},{key:'platform',label:'Platform',type:'select',options:PLATFORMS},{key:'link',label:'Link',type:'text'},{key:'notes',label:'Hook / Notes',type:'textarea'},{key:'stage',label:'Stage',type:'select',options:IDEA_STAGES}]; }

function renderKanban(main) {
  const items = filteredItems('ideas');
  main.innerHTML = `
    <div class="page-head"><h1>Idea Bank</h1><p></p></div>
    ${influencerFilterHtml()}
    <div class="kanban" id="kanbanWrap"></div>`;
  attachFilterPills();
  const wrap = document.getElementById('kanbanWrap');
  IDEA_STAGES.forEach(stage => {
    const col        = document.createElement('div');
    col.className    = 'kcol';
    const stageItems = items.filter(i => (i.stage||'Idea') === stage);
    col.innerHTML    = `<h3>${stage} <span>${stageItems.length}</span></h3>`;
    stageItems.forEach(item => {
      const inf  = state.influencers.find(i => i.id === item.influencer_id);
      const c    = inf ? colorFor(inf.influencer_name) : null;
      const card = document.createElement('div');
      card.className = 'kcard';
      card.innerHTML = `
        ${inf ? `<div><span class="pill" style="background:${c.dim};color:${c.bg};font-size:10px;">${initial(inf.influencer_name)} ${esc(inf.influencer_name)}</span></div>` : ''}
        <div class="card-title" style="margin-top:${inf ? '6px' : '0'};">${esc(item.title)||'Untitled'}</div>
        <div class="card-meta" style="margin-top:4px;">${item.platform?`<span class="pill platform">${esc(item.platform)}</span>`:''}</div>
        ${item.notes ? `<div class="card-notes">${esc(item.notes)}</div>` : ''}
        ${item.link  ? `<a class="link" href="${esc(item.link)}" target="_blank" rel="noopener" style="display:inline-block;margin-top:4px;">Open reference ↗</a>` : ''}
        <div class="card-actions" style="margin-top:8px;">
          <button class="icon-btn" data-act="edit">Edit</button>
          <button class="icon-btn" data-act="del">Delete</button>
        </div>`;
      card.querySelector('[data-act="edit"]').onclick = () => openIdeaModal(item);
      card.querySelector('[data-act="del"]').onclick  = async () => {
        const ok = await sbDelete('idea_bank', item.id);
        if (ok) { state.ideas = state.ideas.filter(x => x.id !== item.id); renderKanban(main); }
      };
      col.appendChild(card);
    });
    const addBtn       = document.createElement('button');
    addBtn.className   = 'kadd';
    addBtn.textContent = '+ Add idea';
    addBtn.onclick     = () => openIdeaModal(null, stage);
    col.appendChild(addBtn);
    wrap.appendChild(col);
  });
}

function openIdeaModal(item, defaultStage) {
  const overlay = document.getElementById('overlay');
  const box     = document.getElementById('modalBox');
  box.className  = 'modal';
  const isEdit   = !!item;
  const data     = item || { stage: defaultStage || 'Idea' };
  const fields   = ideaModalFields();

  const infOptions = state.influencers.map(inf =>
    `<option value="${inf.id}" ${(data.influencer_id === inf.id || (!isEdit && state.activeInfluencerId === inf.id)) ? 'selected' : ''}>${esc(inf.influencer_name)}</option>`
  ).join('');
  const infFieldHtml = state.influencers.length > 0
    ? `<div class="field"><label>Creator</label><select id="i-influencer_id"><option value="">— Unassigned —</option>${infOptions}</select></div>`
    : '';

  const fieldsHtml = fields.map(f => {
    const val = esc(data[f.key]||'');
    if (f.type === 'textarea') return `<div class="field"><label>${f.label}</label><textarea rows="3" id="i-${f.key}">${val}</textarea></div>`;
    if (f.type === 'select') {
      const opts = f.options.map(o => `<option value="${o}" ${data[f.key]===o?'selected':''}>${o}</option>`).join('');
      return `<div class="field"><label>${f.label}</label><select id="i-${f.key}">${opts}</select></div>`;
    }
    return `<div class="field"><label>${f.label}</label><input id="i-${f.key}" value="${val}"></div>`;
  }).join('');

  box.innerHTML = `
    <h2>${isEdit ? 'Edit' : 'Add'} Idea</h2>
    ${infFieldHtml}
    ${fieldsHtml}
    <div class="modal-actions">
      <button class="btn ghost" id="iCancel">Cancel</button>
      <button class="btn primary" id="iSave">${isEdit ? 'Save' : 'Add'}</button>
    </div>`;
  overlay.classList.add('show');
  document.getElementById('iCancel').onclick = closeModal;
  document.getElementById('iSave').onclick   = async () => {
    const obj = {};
    fields.forEach(f => obj[f.key] = document.getElementById('i-'+f.key).value);
    const infSel = document.getElementById('i-influencer_id');
    if (infSel) obj.influencer_id = infSel.value || null;
    if (isEdit) {
      const saved = await sbUpdate('idea_bank', item.id, obj);
      if (saved) { const idx = state.ideas.findIndex(x => x.id === item.id); state.ideas[idx] = saved; }
    } else {
      obj.take_number = nextTake();
      const saved = await sbInsert('idea_bank', obj);
      if (saved) state.ideas.push(saved);
    }
    closeModal();
    renderKanban(document.getElementById('main'));
  };
}

// ── Init ───────────────────────────────────────────────
(async function init() {
  const dot   = document.getElementById('connDot');
  const label = document.getElementById('connLabel');
  if (!configured) {
    label.textContent = 'Not connected — add your Supabase keys';
    render('brand');
    return;
  }
  try {
    await loadAll();
    dot.classList.add('ok');
    label.textContent = 'Connected to Supabase';
    render('brand');
  } catch(e) {
    console.error(e);
    label.textContent = 'Connection failed — check console';
  }
})();
</script>
